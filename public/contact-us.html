<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Tools24</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-box:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="min-h-screen py-12 px-6">
    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-black text-white mb-4 tracking-tight">Get in <span class="text-blue-500">Touch</span></h1>
            <p class="text-slate-400 text-lg">Have feedback or need a custom tool? We are here to help.</p>
        </header>

        <div class="grid md:grid-cols-2 gap-8 items-center">
            <div class="space-y-6">
                <div class="glass-panel p-8 rounded-[2.5rem]">
                    <h3 class="text-2xl font-bold mb-2 text-blue-400">Support Hub</h3>
                    <p class="text-slate-400 leading-relaxed mb-6">Our team is committed to making Tools24 the fastest local-processing utility web app.</p>
                    
                    <div class="space-y-4">
                        <div class="flex items-center gap-4">
                            <span class="bg-blue-600 p-2 rounded-lg">📧</span>
                            <span class="font-medium">support@tools24.com</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="bg-blue-600 p-2 rounded-lg">🕒</span>
                            <span class="font-medium">Reply within 24 Hours</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
